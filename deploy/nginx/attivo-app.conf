# =============================================================================
# ATTIVO — Frontend App (Next.js)
# app.attivocorretora.com.br → proxy para PM2 porta 3000
# Atualizado: 2026-04-11
# =============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.attivocorretora.com.br;

    ssl_certificate     /etc/letsencrypt/live/app.attivocorretora.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.attivocorretora.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Tamanho máximo de upload (formulários, imagens)
    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (Next.js HMR / SSE)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }

    access_log /var/log/nginx/attivo-app.access.log;
    error_log  /var/log/nginx/attivo-app.error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.attivocorretora.com.br;
    return 301 https://app.attivocorretora.com.br$request_uri;
}
