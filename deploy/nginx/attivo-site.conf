# =============================================================================
# ATTIVO — Site Institucional
# attivocorretora.com.br | www → non-www redirect | SSL Let's Encrypt
# Atualizado: 2026-04-11
# =============================================================================

# ── HTTP: tudo vira HTTPS sem www ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name attivocorretora.com.br www.attivocorretora.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://attivocorretora.com.br$request_uri;
    }
}

# ── HTTPS www → redireciona para não-www ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.attivocorretora.com.br;

    ssl_certificate     /etc/letsencrypt/live/attivocorretora.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attivocorretora.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://attivocorretora.com.br$request_uri;
}

# ── HTTPS principal ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name attivocorretora.com.br;

    root  /var/www/attivo-site;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/attivocorretora.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attivocorretora.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    add_header X-XSS-Protection       "1; mode=block"                     always;
    add_header Permissions-Policy     "geolocation=(),microphone=(),camera=()" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml font/woff2;

    # ── Cache de assets estáticos ─────────────────────────────────────────────
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(ico|png|jpg|jpeg|webp|svg|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Conteúdo estático ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /index.html;

    access_log /var/log/nginx/attivo-site.access.log;
    error_log  /var/log/nginx/attivo-site.error.log;
}
