# =============================================================================
# ATTIVO Corretora — Site Institucional
# Domínio: attivocorretora.com.br + www
# Servido de: /var/www/attivo-site (estático)
# SSL: gerenciado pelo Certbot / Let's Encrypt
# =============================================================================

# ── Redirect HTTP → HTTPS (ambos www e não-www) ───────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name attivocorretora.com.br www.attivocorretora.com.br;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://attivocorretora.com.br$request_uri;
    }
}

# ── Redirect www → não-www (HTTPS) ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.attivocorretora.com.br;

    ssl_certificate     /etc/letsencrypt/live/attivocorretora.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attivocorretora.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://attivocorretora.com.br$request_uri;
}

# ── Site principal (HTTPS) ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name attivocorretora.com.br;

    root  /var/www/attivo-site;
    index index.html;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/attivocorretora.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/attivocorretora.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (equivalente ao _headers do Netlify) ──────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection         "1; mode=block"                     always;

    # ── Cache para assets estáticos ────────────────────────────────────────────
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(ico|png|jpg|jpeg|webp|svg|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Servir HTML estático com trailing-slash automático ─────────────────────
    # Nginx faz 301 automático para trailing slash quando encontra diretório.
    # Não é necessário replicar o _redirects do Netlify — comportamento idêntico.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # ── Página 404 customizada ─────────────────────────────────────────────────
    error_page 404 /index.html;

    # ── Logs ───────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/attivo-site.access.log;
    error_log  /var/log/nginx/attivo-site.error.log;
}
