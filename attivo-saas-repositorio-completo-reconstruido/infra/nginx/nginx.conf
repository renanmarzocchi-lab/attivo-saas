# nginx.conf — Attivo Corretora (produção)
# Ubuntu 22.04 + Nginx + Certbot (Let's Encrypt)
#
# Domínios:
#   attivocorretora.com.br        → frontend Next.js (porta 3000)
#   api.attivocorretora.com.br    → backend  Fastify  (porta 3333)
#
# Fluxo SSL:
#   1. Este arquivo configura HTTP (80)
#   2. Certbot lê e injeta blocos HTTPS (443) automaticamente
#   3. Após certbot: HTTP redireciona para HTTPS
#
# Validar antes de aplicar: nginx -t

# ─── Compressão gzip ─────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json
           application/javascript application/rss+xml application/atom+xml
           image/svg+xml;

# ─── Rate limiting ───────────────────────────────────────────────────────────
# IMPORTANTE: definido no contexto http (fora dos server blocks)
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ─── www → sem www (redirect permanente) ─────────────────────────────────────
# Bloco separado — Certbot adiciona SSL para este também
server {
    listen 80;
    server_name www.attivocorretora.com.br;
    return 301 https://attivocorretora.com.br$request_uri;
}

# ─── Frontend — attivocorretora.com.br ───────────────────────────────────────
# Certbot vai adicionar:
#   listen 443 ssl; ssl_certificate ...; ssl_certificate_key ...;
#   return 301 https://... no bloco HTTP
server {
    listen 80;
    server_name attivocorretora.com.br;

    access_log /var/log/nginx/frontend_access.log;
    error_log  /var/log/nginx/frontend_error.log warn;

    # Segurança (headers em HTTP e HTTPS)
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection       "1; mode=block"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Assets estáticos do Next.js — cache imutável (hash no nome do arquivo)
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control     "public, max-age=31536000, immutable";
        expires            1y;
    }

    # Imagens e arquivos públicos do Next.js
    location /_next/image {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control     "public, max-age=86400";
    }

    # Todas as demais rotas → Next.js (SSR + rotas da app)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Evita erro 502 quando Next.js reinicia
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }
}

# ─── Backend API — api.attivocorretora.com.br ─────────────────────────────────
server {
    listen 80;
    server_name api.attivocorretora.com.br;

    access_log /var/log/nginx/api_access.log;
    error_log  /var/log/nginx/api_error.log warn;

    add_header X-Content-Type-Options "nosniff"  always;
    add_header X-Frame-Options        "DENY"     always;

    # Limite de tamanho para uploads de anexos
    client_max_body_size 20M;

    # ── Health / Ready — sem rate limit (para monitoring externo) ────────────
    location = /health {
        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;  # Reduz ruído nos logs
    }

    location = /ready {
        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── Login — rate limit severo (5 req/min por IP) ─────────────────────────
    location = /api/v1/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API geral — rate limit normal (30 req/s, burst 50) ───────────────────
    location / {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }
}
