services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       attivo_saas
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres -d attivo_saas"]
      interval: 10s
      timeout:  5s
      retries:  10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  migrate:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/attivo_saas?schema=public
    command: >
      sh -c "npx prisma migrate deploy && npx prisma generate && node prisma/seed.js"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    ports:
      - "3333:3333"
    environment:
      NODE_ENV:      production
      PORT:          3333
      DATABASE_URL:  postgresql://postgres:postgres@postgres:5432/attivo_saas?schema=public
      REDIS_URL:     redis://redis:6379
      JWT_SECRET:    ${JWT_SECRET:-mude-esta-chave-em-producao}
      CORS_ORIGIN:   ${CORS_ORIGIN:-http://localhost:3000}
      MASTER_ADMIN_EMAIL:    ${MASTER_ADMIN_EMAIL:-admin@attivo.local}
      MASTER_ADMIN_PASSWORD: ${MASTER_ADMIN_PASSWORD:-Attivo@123456}
      MASTER_ADMIN_NAME:     ${MASTER_ADMIN_NAME:-Administrador ATTIVO}
      MASTER_ADMIN_DOCUMENT: ${MASTER_ADMIN_DOCUMENT:-12345678909}
      # WhatsApp
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-stub}
      WHATSAPP_API_URL:  ${WHATSAPP_API_URL:-}
      WHATSAPP_API_KEY:  ${WHATSAPP_API_KEY:-}
      WHATSAPP_INSTANCE: ${WHATSAPP_INSTANCE:-}
      # Storage
      STORAGE_PROVIDER:     ${STORAGE_PROVIDER:-local}
      STORAGE_LOCAL_PATH:   /app/uploads
      STORAGE_PUBLIC_URL:   ${STORAGE_PUBLIC_URL:-http://localhost:3333/uploads}
      STORAGE_MAX_SIZE_MB:  ${STORAGE_MAX_SIZE_MB:-10}
      # S3 (opcional)
      AWS_REGION:             ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID:      ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY:  ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET:              ${S3_BUCKET:-}
      S3_PUBLIC_URL:          ${S3_PUBLIC_URL:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333/api/v1}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
